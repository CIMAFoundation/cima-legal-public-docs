<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documenti ufficiali esposti</title>
    <link rel="stylesheet" href="assets/official-docs.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>Lista Documenti ufficiali esposti</h1>
        <p>Vista del file pubblico latest usato da landing-pages/portali.</p>
      </header>

      <section class="card">
        <div id="status" class="status">Caricamento manifest...</div>
        <div class="table-wrap">
          <table aria-describedby="status">
            <thead>
              <tr>
                <th>Linea</th>
                <th>Piattaforma</th>
                <th>Tipo</th>
                <th>Lingua</th>
                <th>Versione</th>
                <th>Data</th>
                <th>PDF pubblico</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="assets/official-docs.js"></script>
  </body>
</html>
